apiVersion: agenthippo.ai/v1
kind: Agent

metadata:
  name: explanatory-output-style
  version: 1.0.0
  description: "This plugin recreates the deprecated Explanatory output style as a SessionStart"
  author: AgentHippo
  license: MIT
  tags:
    - agenthippo
    - converted-plugin
  source:
    type: claude-code-plugin
    slug: explanatory-output-style
  store:
    listed: false
    reason: "Requires AgentHippo session-start hook support before public listing."

spec:
  engine: openclaw
  model: litellm/gpt-5.3-codex

  prompts:
    system: ./AGENTS.md
    rules: []

  permissions:
    approval: unrestricted
    fileAccess: full

  visibility: public

