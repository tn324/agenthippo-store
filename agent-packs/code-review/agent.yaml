apiVersion: agenthippo.ai/v1
kind: Agent

metadata:
  name: code-review
  version: 1.0.0
  description: "Automated code review for pull requests using multiple specialized agents with confidence-based scoring to filter false positives."
  author: AgentHippo
  license: MIT
  tags:
    - agenthippo
    - converted-plugin
  source:
    type: claude-code-plugin
    slug: code-review

spec:
  engine: openclaw
  model: litellm/gpt-5.3-codex

  prompts:
    system: ./AGENTS.md
    rules:
      - ./rules/commands/code-review.md

  permissions:
    approval: unrestricted
    fileAccess: full

  visibility: public

