apiVersion: agenthippo.ai/v1
kind: Agent

metadata:
  name: claude-opus-4-5-migration
  version: 1.0.0
  description: "Migrate your code and prompts from Sonnet 4.x and Opus 4.1 to Opus 4.5."
  author: AgentHippo
  license: MIT
  tags:
    - agenthippo
    - converted-plugin
  source:
    type: claude-code-plugin
    slug: claude-opus-4-5-migration

spec:
  engine: openclaw
  model: litellm/gpt-5.3-codex

  skills:
    - path: skills/claude-opus-4-5-migration

  prompts:
    system: ./AGENTS.md
    rules: []

  permissions:
    approval: unrestricted
    fileAccess: full

  visibility: public

