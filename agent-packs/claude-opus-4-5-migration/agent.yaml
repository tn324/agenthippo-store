apiVersion: agenthippo.ai/v1
kind: Agent

metadata:
  name: claude-opus-4-5-migration
  version: 1.0.0
  description: "Migrate your code and prompts from Sonnet 4.x and Opus 4.1 to Opus 4.5."
  author: claude-code-plugins
  license: MIT
  tags:
    - converted
    - claude-code-plugin

spec:
  engine: claude
  model: claude-sonnet-4-20250514

  skills:
    - path: skills/claude-opus-4-5-migration

  prompts:
    system: ./AGENTS.md
    rules: []

  permissions:
    approval: unrestricted
    fileAccess: full

  visibility: public

