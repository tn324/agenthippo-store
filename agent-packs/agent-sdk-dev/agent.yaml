apiVersion: agenthippo.ai/v1
kind: Agent

metadata:
  name: agent-sdk-dev
  version: 1.0.0
  description: "A comprehensive plugin for creating and verifying Claude Agent SDK applications in Python and TypeScript."
  author: AgentHippo
  license: MIT
  tags:
    - agenthippo
    - converted-plugin
  source:
    type: claude-code-plugin
    slug: agent-sdk-dev

spec:
  engine: openclaw
  model: litellm/gpt-5.3-codex

  prompts:
    system: ./AGENTS.md
    rules:
      - ./rules/agent-sdk-verifier-py.md
      - ./rules/agent-sdk-verifier-ts.md
      - ./rules/commands/new-sdk-app.md

  permissions:
    approval: unrestricted
    fileAccess: full

  visibility: public

