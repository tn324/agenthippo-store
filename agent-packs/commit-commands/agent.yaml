apiVersion: agenthippo.ai/v1
kind: Agent

metadata:
  name: commit-commands
  version: 1.0.0
  description: "Streamline your git workflow with simple commands for committing, pushing, and creating pull requests."
  author: AgentHippo
  license: MIT
  tags:
    - agenthippo
    - converted-plugin
  source:
    type: claude-code-plugin
    slug: commit-commands

spec:
  engine: openclaw
  model: litellm/gpt-5.3-codex

  prompts:
    system: ./AGENTS.md
    rules:
      - ./rules/commands/clean_gone.md
      - ./rules/commands/commit-push-pr.md
      - ./rules/commands/commit.md

  permissions:
    approval: unrestricted
    fileAccess: full

  visibility: public

