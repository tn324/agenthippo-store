apiVersion: agenthippo.ai/v1
kind: Agent

metadata:
  name: hookify
  version: 1.0.0
  description: "Easily create custom hooks to prevent unwanted behaviors by analyzing conversation patterns or from explicit instructions."
  author: AgentHippo
  license: MIT
  tags:
    - agenthippo
    - converted-plugin
  source:
    type: claude-code-plugin
    slug: hookify
  store:
    listed: false
    reason: "Requires AgentHippo hook runtime adaptation before public listing."

spec:
  engine: openclaw
  model: litellm/gpt-5.3-codex

  skills:
    - path: skills/writing-rules

  prompts:
    system: ./AGENTS.md
    rules:
      - ./rules/conversation-analyzer.md
      - ./rules/commands/configure.md
      - ./rules/commands/help.md
      - ./rules/commands/hookify.md
      - ./rules/commands/list.md

  permissions:
    approval: unrestricted
    fileAccess: full

  visibility: public

