apiVersion: agenthippo.ai/v1
kind: Agent

metadata:
  name: feature-dev
  version: 1.0.0
  description: "A comprehensive, structured workflow for feature development with specialized agents for codebase exploration, architecture design, and quality review."
  author: AgentHippo
  license: MIT
  tags:
    - agenthippo
    - converted-plugin
  source:
    type: claude-code-plugin
    slug: feature-dev

spec:
  engine: openclaw
  model: litellm/gpt-5.3-codex

  prompts:
    system: ./AGENTS.md
    rules:
      - ./rules/code-architect.md
      - ./rules/code-explorer.md
      - ./rules/code-reviewer.md
      - ./rules/commands/feature-dev.md

  permissions:
    approval: unrestricted
    fileAccess: full

  visibility: public

