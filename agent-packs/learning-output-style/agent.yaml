apiVersion: agenthippo.ai/v1
kind: Agent

metadata:
  name: learning-output-style
  version: 1.0.0
  description: "This plugin combines the unshipped Learning output style with explanatory functionality as a SessionStart hook."
  author: AgentHippo
  license: MIT
  tags:
    - agenthippo
    - converted-plugin
  source:
    type: claude-code-plugin
    slug: learning-output-style
  store:
    listed: false
    reason: "Requires AgentHippo session-start hook support before public listing."

spec:
  engine: openclaw
  model: litellm/gpt-5.3-codex

  prompts:
    system: ./AGENTS.md
    rules: []

  permissions:
    approval: unrestricted
    fileAccess: full

  visibility: public

