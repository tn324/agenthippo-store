apiVersion: agenthippo.ai/v1
kind: Agent

metadata:
  name: ralph-wiggum
  version: 1.0.0
  description: "Implementation of the Ralph Wiggum technique for iterative, self-referential AI development loops in Claude Code."
  author: AgentHippo
  license: MIT
  tags:
    - agenthippo
    - converted-plugin
  source:
    type: claude-code-plugin
    slug: ralph-wiggum
  store:
    listed: false
    reason: "Requires AgentHippo hook runtime adaptation before public listing."

spec:
  engine: openclaw
  model: litellm/gpt-5.3-codex

  prompts:
    system: ./AGENTS.md
    rules:
      - ./rules/commands/cancel-ralph.md
      - ./rules/commands/help.md
      - ./rules/commands/ralph-loop.md

  permissions:
    approval: unrestricted
    fileAccess: full

  visibility: public

